spring.application.name=backendpfe

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fraud_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:0000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

app.jwt.secret=CHANGE_THIS_TO_A_VERY_LONG_SECRET_KEY_123456789_CHANGE_ME
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000